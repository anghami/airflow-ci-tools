name: Test Reusable Workflow

on:
  workflow_call:
    inputs:
      test-input:
        description: 'Test input'
        required: false
        type: string
        default: 'test'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test step
        run: echo "Test workflow called successfully with input: ${{ inputs.test-input }}"